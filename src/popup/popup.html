<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Media Capture</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body class="bg-slate-950 text-slate-100 overflow-x-hidden">
    <main class="w-full min-w-[320px] max-w-[420px] p-3 grid gap-2.5">
      <header class="hero">
        <h1 class="m-0 text-base font-semibold tracking-wide">Media Capture</h1>
        <p class="subtitle text-[11px] text-slate-400">Queue manager</p>
      </header>

      <section class="panel panel-tight rounded-xl border border-slate-700/80 bg-slate-900/80 p-2.5">
        <div class="row row-spread flex items-center justify-between gap-2">
          <label for="plan" class="text-xs text-slate-300">Plan</label>
          <p id="plan-status" class="hint"></p>
        </div>
        <div class="row row-controls mt-2 flex items-center gap-2">
          <select id="plan" class="h-8 rounded-md border border-slate-600 bg-slate-800 px-2 text-xs">
            <option value="premium">premium</option>
            <option value="enterprise">enterprise</option>
          </select>
          <button id="save-plan" class="btn btn-primary">Save</button>
        </div>
      </section>

      <section class="panel rounded-xl border border-slate-700/80 bg-slate-900/80 p-2.5">
        <div class="panel-title mb-2 border-b border-slate-700 pb-1.5 text-xs text-slate-300">Detected Media</div>
        <div class="row row-wrap media-actions flex flex-wrap items-center gap-2">
          <button id="scan" class="btn btn-primary">Scan Current Tab</button>
          <button id="clear-media" class="btn btn-muted">Clear Saved Media</button>
        </div>
        <p class="hint" id="scan-status"></p>
        <ul id="media-list"></ul>
      </section>

      <section class="panel rounded-xl border border-slate-700/80 bg-slate-900/80 p-2.5">
        <div class="panel-title mb-2 border-b border-slate-700 pb-1.5 text-xs text-slate-300">Complete</div>
        <div class="row flex items-center gap-2">
          <button id="refresh-jobs" class="btn btn-primary">Refresh Jobs</button>
        </div>
        <div class="row row-wrap job-actions-row mt-2 flex flex-wrap items-center gap-2">
          <button id="clear-completed" class="btn btn-muted">Clear Completed</button>
          <button id="clear-failed-cancelled" class="btn btn-muted">Clear Failed/Cancelled</button>
          <button id="clear-terminal" class="btn btn-muted">Clear All Terminal</button>
        </div>
        <div class="row row-controls mt-2 flex items-center gap-2">
          <label for="retention-days" class="text-xs text-slate-300">Retention (days)</label>
          <input id="retention-days" type="number" min="0" max="365" class="h-8 w-[70px] rounded-md border border-slate-600 bg-slate-800 px-2 text-xs" />
          <button id="save-retention" class="btn btn-primary">Save</button>
        </div>
        <p class="hint" id="jobs-status"></p>
        <ul id="job-list"></ul>
      </section>
    </main>

    <script type="module" src="./popup.js"></script>
  </body>
</html>
