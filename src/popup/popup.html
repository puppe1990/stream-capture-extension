<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Media Capture</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="popup-root">

      <!-- Header -->
      <header class="popup-header">
        <div class="header-brand">
          <div class="header-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
            </svg>
          </div>
          <div>
            <h1 class="header-title">Media Capture</h1>
            <p class="header-sub">Queue Manager</p>
          </div>
        </div>
        <div class="header-badge" id="plan-badge">Free</div>
      </header>

      <!-- Detected Media -->
      <section class="card">
        <div class="card-header">
          <span class="card-title">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            Detected Media
          </span>
          <p class="hint" id="scan-status"></p>
        </div>
        <div class="action-row">
          <button id="scan" class="btn btn-primary">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            Scan Tab
          </button>
          <button id="clear-media" class="btn btn-ghost">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
              <path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
            </svg>
            Clear
          </button>
        </div>
        <ul id="media-list"></ul>
      </section>

      <!-- Downloads / Jobs -->
      <section class="card">
        <div class="card-header">
          <span class="card-title">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Downloads
          </span>
          <button id="refresh-jobs" class="btn-icon" title="Refresh jobs">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
          </button>
        </div>

        <div class="clear-row">
          <button id="clear-completed" class="btn btn-ghost btn-sm">Completed</button>
          <button id="clear-failed-cancelled" class="btn btn-ghost btn-sm">Failed</button>
          <button id="clear-terminal" class="btn btn-ghost btn-sm">All</button>
        </div>

        <p class="hint" id="jobs-status"></p>
        <ul id="job-list"></ul>

        <!-- Settings footer -->
        <div class="settings-footer">
          <div class="setting-row">
            <label for="retention-days" class="setting-label">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
              </svg>
              Retention
            </label>
            <input id="retention-days" type="number" min="0" max="365" class="input-sm" placeholder="days" />
            <button id="save-retention" class="btn btn-xs btn-primary">Save</button>
          </div>
          <div class="setting-row">
            <label for="plan" class="setting-label">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
              </svg>
              Plan
            </label>
            <select id="plan" class="select-sm">
              <option value="premium">Premium</option>
              <option value="enterprise">Enterprise</option>
            </select>
            <button id="save-plan" class="btn btn-xs btn-primary">Save</button>
          </div>
          <p id="plan-status" class="hint"></p>
        </div>
      </section>

    </main>
    <script type="module" src="./popup.js"></script>
  </body>
</html>
